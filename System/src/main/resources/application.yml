spring:
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
      poll-interval: 1s
      quiet-period: 400ms
    livereload:
      enabled: true

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:programming_system}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mybatis/*.xml
  type-aliases-package: com.programming.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

programming:
  jwt:
    secret: ${PROGRAMMING_JWT_SECRET:programming_system_2026_secret_key}
    expire: ${PROGRAMMING_JWT_EXPIRE:86400000}
  docker:
    host: ${PROGRAMMING_DOCKER_HOST:tcp://127.0.0.1:2375}
    timeout: ${PROGRAMMING_DOCKER_TIMEOUT:2000}
    memory: ${PROGRAMMING_DOCKER_MEMORY:134217728}
  ai:
    api-key: ${PROGRAMMING_AI_API_KEY:}
    api-url: ${PROGRAMMING_AI_API_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    prompt: ${PROGRAMMING_AI_PROMPT:你是专业的编程助教，只回答编程相关问题，给出清晰思路和示例代码，不直接给完整答案。}

server:
  port: ${SERVER_PORT:8080}
