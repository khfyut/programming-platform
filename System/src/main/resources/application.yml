spring:
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java
      poll-interval: 1s
      quiet-period: 400ms
    livereload:
      enabled: true

  datasource:
    url: jdbc:mysql://${DB_HOST:192.168.59.133}:${DB_PORT:3306}/${DB_NAME:programming_system}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  flyway:
    enabled: ${DB_MIGRATION_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${DB_MIGRATION_BASELINE_ON_MIGRATE:true}
    baseline-version: 1
    validate-on-migrate: true
    clean-disabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mybatis/*.xml
  type-aliases-package: com.programming.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

programming:
  jwt:
    secret: ${PROGRAMMING_JWT_SECRET:programming_system_2026_secret_key}
    expire: ${PROGRAMMING_JWT_EXPIRE:86400000}
  docker:
    host: ${PROGRAMMING_DOCKER_HOST:tcp://127.0.0.1:2375}
    timeout: ${PROGRAMMING_DOCKER_TIMEOUT:2000}
    memory: ${PROGRAMMING_DOCKER_MEMORY:134217728}
    cpu: ${PROGRAMMING_DOCKER_CPU:0.5}
  ai:
    provider: ${PROGRAMMING_AI_PROVIDER:openai-compatible}
    model: ${PROGRAMMING_AI_MODEL:deepseek-v4-flash}
    ollama-url: ${PROGRAMMING_AI_OLLAMA_URL:http://127.0.0.1:11434}
    api-key: ${PROGRAMMING_AI_API_KEY:sk-placeholder}
    api-url: ${PROGRAMMING_AI_API_URL:https://api.deepseek.com/v1}
    prompt: ${PROGRAMMING_AI_PROMPT:你是专业的编程助教，只回答编程学习相关问题。回答要清晰、有步骤，优先解释思路，再给必要示例。}

server:
  port: ${SERVER_PORT:8080}
